
ckpt_dir: ./ckpts
output_dir: ./outputs
sample_steps: 50
gpu_process_monitor_interval_seconds: 5.0
solver_name: unipc
model_name: "960x960_10s" # ["720x720_5s", "960x960_5s", "960x960_10s"]
shift: 5.0
sp_size: 1
audio_guidance_scale: 3.0
video_guidance_scale: 4.0
mode: "i2v" # ["t2v", "i2v", "t2i2v"] all comes with audio
fp8: False
cpu_offload: False
seed: 103
video_negative_prompt: "jitter, bad hands, blur, distortion"  # Artifacts to avoid in video
audio_negative_prompt: "robotic, muffled, echo, distorted"    # Artifacts to avoid in audio
video_frame_height_width: [704, 1280] # only useful if mode = t2v or t2i2v, recommended values: [704, 1280], [1280, 704], [960, 960], [512, 992], [992, 512], [960, 512], [512, 960], [720, 720], [448, 1120]
text_prompt: example_prompts/gpt_examples_10s_i2v.csv
slg_layer: 11
each_example_n_times: 2

# FastA2V acceleration switches. Defaults preserve official dense behavior.
attention_method: "dense" # ["dense", "sparge", "radial", "svg"]
use_cfg_cache: False
# Inclusive cache window; refreshes are anchored at cfg_cache_start_step.
cfg_cache_start_step: 10
cfg_cache_end_step: 39
cfg_cache_refresh_interval: 5
use_block_cache: False
debug_forward: False
debug_forward_step: 0
