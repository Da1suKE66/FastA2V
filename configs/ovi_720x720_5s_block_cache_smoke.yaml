ckpt_dir: /cache/liluchen/FastA2V/ckpts
output_dir: ${oc.env:FASTA2V_RUN_DIR,/cache/liluchen/FastA2V/runs/ovi_720ckpt_block_cache_smoke_manual}

model_name: "720x720_5s"
mode: "t2v"
video_frame_height_width: [720, 720]
sample_steps: 20
solver_name: "unipc"
shift: 5.0
sp_size: 1

audio_guidance_scale: 3.0
video_guidance_scale: 4.0
slg_layer: 11
video_negative_prompt: "jitter, bad hands, blur, distortion"
audio_negative_prompt: "robotic, muffled, echo, distorted"

fp8: false
qint8: false
cpu_offload: false
seed: 103
text_prompt: prompts/ovi_smoke.csv
each_example_n_times: 1
warmup_runs: 0
measurement_runs: 1
run_kind: "block_cache_diagnostic_smoke"
benchmark_eligible: false

attention_method: "dense"
use_cfg_cache: false
cfg_cache_start_step: 10
cfg_cache_end_step: 39
cfg_cache_refresh_interval: 5
use_block_cache: true
block_cache_start_block: 10
block_cache_end_block: 19
block_cache_policy: "fixed"
block_cache_cosine_threshold: 0.95
block_cache_max_consecutive_reuses: 1
debug_forward: true
debug_forward_step: 1
