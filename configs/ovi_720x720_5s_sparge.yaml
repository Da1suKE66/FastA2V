ckpt_dir: /cache/liluchen/FastA2V/ckpts
output_dir: ${oc.env:FASTA2V_RUN_DIR,/cache/liluchen/FastA2V/runs/ovi_720ckpt_sparge_50step_manual}

model_name: "720x720_5s"
mode: "t2v"
video_frame_height_width: [720, 720]
sample_steps: 50
solver_name: "unipc"
shift: 5.0
sp_size: 1

audio_guidance_scale: 3.0
video_guidance_scale: 4.0
slg_layer: 11
video_negative_prompt: "jitter, bad hands, blur, distortion"
audio_negative_prompt: "robotic, muffled, echo, distorted"

fp8: false
qint8: false
cpu_offload: false
seed: 103
text_prompt: prompts/ovi_smoke.csv
each_example_n_times: 1
warmup_runs: 1
measurement_runs: 3
run_kind: "sparge_baseline"
benchmark_eligible: true

attention_method: "sparge"
sparge_topk: 0.5
sparge_pvthreshd: 50
sparge_smooth_k: true
use_cfg_cache: false
cfg_cache_start_step: 10
cfg_cache_end_step: 39
cfg_cache_refresh_interval: 5
use_block_cache: false
debug_forward: false
debug_forward_step: 0
